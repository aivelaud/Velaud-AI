name: Build Velaud AI APK

on:
  push:
    branches: [ main, clean-main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Build APK (base + gömülü arm64 native libs)
        working-directory: apk_work/decompiled
        run: |
          echo "=== lib/arm64-v8a içeriği ==="
          ls -lh lib/arm64-v8a/ 2>/dev/null || echo "lib/ yok"
          echo ""
          echo "=== APK build ediliyor ==="
          apktool b . -o ../../velaud-unsigned.apk
          echo ""
          ls -lh ../../velaud-unsigned.apk
          echo ""
          echo "=== .so dosyaları compression kontrolü ==="
          unzip -v ../../velaud-unsigned.apk | grep "\.so"

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore velaud-debug.keystore \
            -alias velaud \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass velaud123 \
            -keypass velaud123 \
            -dname "CN=Velaud AI, OU=Dev, O=Velaud, L=Istanbul, ST=Istanbul, C=TR"

      - name: Zipalign ve Sign — base APK
        run: |
          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          echo "Build tools: $BT"

          $BT/zipalign -v 4 velaud-unsigned.apk velaud-aligned.apk

          $BT/apksigner sign \
            --ks velaud-debug.keystore \
            --ks-key-alias velaud \
            --ks-pass pass:velaud123 \
            --key-pass pass:velaud123 \
            --out velaud-base-signed.apk \
            velaud-aligned.apk

          echo "=== İmzalı APK ==="
          ls -lh velaud-base-signed.apk
          $BT/apksigner verify --verbose velaud-base-signed.apk

      - name: Re-sign arm64 split APK
        run: |
          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          SPLIT=apk_work/decompiled/splits/split_config.arm64_v8a.apk
          if [ -f "$SPLIT" ]; then
            echo "=== arm64 split re-sign ==="
            $BT/zipalign -v 4 "$SPLIT" arm64-aligned.apk
            $BT/apksigner sign \
              --ks velaud-debug.keystore \
              --ks-key-alias velaud \
              --ks-pass pass:velaud123 \
              --key-pass pass:velaud123 \
              --out velaud-arm64-split-signed.apk \
              arm64-aligned.apk
            ls -lh velaud-arm64-split-signed.apk
          else
            echo "arm64 split bulunamadı, atlandı (native libs zaten base.apk içinde)"
          fi

      - name: Get version info
        id: version
        working-directory: apk_work/decompiled
        run: |
          VERSION=$(grep "versionName:" apktool.yml | awk '{print $2}')
          BUILD=$(grep "versionCode:" apktool.yml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Version: $VERSION | Code: $BUILD | Run: ${{ github.run_number }}"

      - name: Upload base APK
        uses: actions/upload-artifact@v4
        with:
          name: Velaud-AI-base-v${{ steps.version.outputs.version }}-run${{ github.run_number }}
          path: velaud-base-signed.apk
          retention-days: 30

      - name: Upload arm64 split APK
        if: hashFiles('velaud-arm64-split-signed.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Velaud-AI-arm64split-v${{ steps.version.outputs.version }}-run${{ github.run_number }}
          path: velaud-arm64-split-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Velaud AI v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## 📱 Velaud AI APK

            **Versiyon:** ${{ steps.version.outputs.version }}
            **Build:** ${{ github.run_number }}

            ---

            ### ✅ Değişiklikler
            - Tüm mesaj ve dosya limitleri kaldırıldı
            - Herkes otomatik MAX planda
            - Ödeme sistemi kaldırıldı
            - ARM64 native lib'leri base.apk içine gömüldü (tek APK yeterli)

            ---

            ### 📥 Kurulum

            **Sadece `velaud-base-signed.apk` kur — başka dosya gerekmez.**
            ARM64 native lib'leri zaten içinde, tek APK ile çalışır.

            > ⚠️ Ayarlar → Güvenlik → "Bilinmeyen kaynaklardan yükleme" aktif olmalı.

          files: |
            velaud-base-signed.apk
            velaud-arm64-split-signed.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
