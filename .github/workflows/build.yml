name: Build Claude APK

on:
  push:
    branches: [ main, clean-main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Orijinal APK çıkar + Smali decompile
        run: |
          echo "=== Orijinal APK çıkarılıyor ==="
          unzip -o apk_work/base.apk.zip -d orig_dir/
          ls -lh orig_dir/base.apk

          echo "=== Smali decompile ediliyor (binary kaynaklar korunuyor) ==="
          apktool d -r -f orig_dir/base.apk -o work/
          ls work/
          echo "Smali dosya sayısı: $(find work/smali* -name '*.smali' 2>/dev/null | wc -l)"

      - name: Manifesti text olarak decode et
        run: |
          echo "=== Manifest ayrı decode ediliyor ==="
          apktool d -s -f orig_dir/base.apk -o manifest_work/
          file manifest_work/AndroidManifest.xml
          echo "=== Mevcut Application class ==="
          grep -o 'android:name="[^"]*Application[^"]*"' manifest_work/AndroidManifest.xml | head -5 || true

      - name: Split metadata kaldır (standalone APK)
        run: |
          echo "=== Split metadata kaldırılıyor ==="
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("manifest_work/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          # Split attribute ve meta-data kaldır
          text = re.sub(r'\s+android:(?:requiredSplitTypes|splitTypes)="[^"]*"', '', text)
          text = re.sub(
              r'\s*<meta-data\b[^>]*android:name="com\.android\.vending\.splits(?:\.required)?"[^>]*/>', '', text
          )

          manifest.write_text(text, encoding="utf-8")
          print("✓ Split metadata temizlendi")

          # Package com.anthropic.claude olmalı
          content = manifest.read_text()
          assert 'com.anthropic.claude' in content, "Package eksik"
          print("✓ Manifest doğrulandı: package=com.anthropic.claude")
          PY

          # splits0.xml binary resource da kaldır
          rm -f work/res/xml/splits0.xml && echo "✓ splits0.xml kaldırıldı" || echo "splits0.xml zaten yok"

      - name: Smali bypass patchlerini uygula
        run: |
          echo "=== Bypass patchleri uygulanıyor ==="
          echo "NOT: Orijinal ClaudeApplication korunuyor — crash döngüsü riski yok"

          # --- Obfuscated root-level bypass patch'leri ---
          cp apk_work/decompiled/smali/b3d.smali work/smali/ \
            && echo "✓ b3d.smali (rate limit bypass)" || echo "✗ b3d.smali bulunamadı"

          cp apk_work/decompiled/smali/ig3.smali work/smali/ \
            && echo "✓ ig3.smali (limit bypass)" || echo "✗ ig3.smali bulunamadı"

          cp apk_work/decompiled/smali/BellConfig.smali work/smali/ \
            && echo "✓ BellConfig.smali" || echo "✗ BellConfig.smali bulunamadı"

          # --- Organization patch: rate_limit_tier = 'max' ---
          # Orijinal class com.anthropic.claude.api.account.Organization'dır.
          # Decompile edilen dosyayı bul ve patch ile DEĞİŞTİR (ek değil!).
          ORG_TARGET=$(find work/smali* -type f -name 'Organization.smali' \
            -path '*/anthropic/claude/api/account/*' | head -1)
          if [ -n "$ORG_TARGET" ]; then
            sed 's|com/anthropic/velaud/|com/anthropic/claude/|g
                 s|com\.anthropic\.velaud\.|com.anthropic.claude.|g' \
              apk_work/decompiled/smali/com/anthropic/velaud/api/account/Organization.smali \
              > "$ORG_TARGET"
            echo "✓ Organization.smali patched: $ORG_TARGET"
          else
            # Fallback: smali/ altına ekle
            mkdir -p work/smali/com/anthropic/claude/api/account/
            sed 's|com/anthropic/velaud/|com/anthropic/claude/|g
                 s|com\.anthropic\.velaud\.|com.anthropic.claude.|g' \
              apk_work/decompiled/smali/com/anthropic/velaud/api/account/Organization.smali \
              > work/smali/com/anthropic/claude/api/account/Organization.smali
            echo "✓ Organization.smali fallback olarak smali/ altına eklendi"
          fi

          # --- File upload limit patch (10 GB) ---
          # Orijinal class com.anthropic.claude.chat.input.files.a
          FILES_TARGET=$(find work/smali* -type f -name 'a.smali' \
            -path '*/anthropic/claude/chat/input/files/*' | head -1)
          if [ -n "$FILES_TARGET" ]; then
            sed 's|com/anthropic/velaud/|com/anthropic/claude/|g
                 s|com\.anthropic\.velaud\.|com.anthropic.claude.|g' \
              "apk_work/decompiled/smali/com/anthropic/velaud/chat/input/files/a.smali" \
              > "$FILES_TARGET"
            echo "✓ files/a.smali patched: $FILES_TARGET"
          else
            mkdir -p work/smali/com/anthropic/claude/chat/input/files/
            sed 's|com/anthropic/velaud/|com/anthropic/claude/|g
                 s|com\.anthropic\.velaud\.|com.anthropic.claude.|g' \
              "apk_work/decompiled/smali/com/anthropic/velaud/chat/input/files/a.smali" \
              > work/smali/com/anthropic/claude/chat/input/files/a.smali
            echo "✓ files/a.smali fallback olarak smali/ altına eklendi"
          fi

          echo ""
          echo "=== Patch özeti ==="
          echo "Velaud class enjekte edilmedi. Orijinal ClaudeApplication + MainActivity korunuyor."
          echo "Patch edilen: b3d, ig3, BellConfig, Organization, files/a"

      - name: ARM64 native lib ekle
        run: |
          echo "=== ARM64 native lib'leri ekleniyor ==="
          mkdir -p work/lib/arm64-v8a/
          cp apk_work/decompiled/lib/arm64-v8a/*.so work/lib/arm64-v8a/
          echo "Eklenen lib'ler:"
          ls -lh work/lib/arm64-v8a/

      - name: apktool.yml güncelle
        working-directory: work
        run: |
          echo "=== Mevcut apktool.yml ==="
          cat apktool.yml

          if grep -q "renameManifestPackage: null" apktool.yml; then
            sed -i 's/renameManifestPackage: null/renameManifestPackage: com.anthropic.claude/' apktool.yml
            echo "→ renameManifestPackage ayarlandı"
          elif grep -q "renameManifestPackage:" apktool.yml; then
            sed -i 's/renameManifestPackage:.*/renameManifestPackage: com.anthropic.claude/' apktool.yml
            echo "→ renameManifestPackage güncellendi"
          else
            sed -i '/forcedPackageId:/a\  renameManifestPackage: com.anthropic.claude' apktool.yml
            echo "→ renameManifestPackage eklendi"
          fi

          sed -i 's/forcedPackageId: null/forcedPackageId: 127/' apktool.yml || true

          if ! grep -q "^doNotCompress:" apktool.yml; then
            printf '\ndoNotCompress:\n- dex\n- so\n- resources.arsc\n' >> apktool.yml
            echo "→ doNotCompress eklendi"
          else
            grep -q "^- dex" apktool.yml || sed -i '/^doNotCompress:/a - dex' apktool.yml
            grep -q "^- so"  apktool.yml || sed -i '/^doNotCompress:/a - so'  apktool.yml
            echo "→ doNotCompress güncellendi"
          fi

          echo "=== Güncellenmiş apktool.yml ==="
          cat apktool.yml

      - name: APK Build
        run: |
          echo "=== APK build ediliyor ==="
          apktool b work/ -o claude-unsigned.apk
          ls -lh claude-unsigned.apk
          echo ""
          echo "=== DEX + .so compression kontrolü ==="
          unzip -v claude-unsigned.apk | grep -E "\.dex|\.so|resources\.arsc"

      - name: Binary manifesti APK'ya uygula
        run: |
          echo "=== Manifest binary XML'e çevriliyor ==="
          unzip -p apk_work/apktool.jar prebuilt/linux/aapt_64 > aapt
          chmod +x aapt

          FRAMEWORK=$(find "$HOME/.local/share/apktool/framework" -name 1.apk -print -quit)
          [ -n "$FRAMEWORK" ] || { echo "✗ Framework 1.apk bulunamadı"; exit 1; }

          VERSION_CODE=$(grep "versionCode:" apk_work/decompiled/apktool.yml | awk '{print $2}')
          VERSION_NAME=$(grep "versionName:" apk_work/decompiled/apktool.yml | awk '{print $2}')

          ./aapt package -f \
            -M manifest_work/AndroidManifest.xml \
            -I "$FRAMEWORK" \
            -I orig_dir/base.apk \
            --forced-package-id 127 \
            --min-sdk-version 32 \
            --target-sdk-version 36 \
            --version-code "$VERSION_CODE" \
            --version-name "$VERSION_NAME" \
            -F manifest-only.apk

          mkdir -p manifest_replace
          unzip -p manifest-only.apk AndroidManifest.xml > manifest_replace/AndroidManifest.xml
          test -s manifest_replace/AndroidManifest.xml || { echo "✗ Binary manifest üretilemedi"; exit 1; }

          ./aapt remove claude-unsigned.apk AndroidManifest.xml || true
          (cd manifest_replace && zip -q -j ../claude-unsigned.apk AndroidManifest.xml)
          rm -rf manifest_replace manifest-only.apk

          # --- Doğrulamalar ---
          ./aapt dump badging claude-unsigned.apk | grep -q "name='com.anthropic.claude'" \
            && echo "✓ Package: com.anthropic.claude" \
            || { echo "✗ Package hatası"; exit 1; }

          MANIFEST_TREE=$(./aapt dump xmltree claude-unsigned.apk AndroidManifest.xml)

          # Orijinal ClaudeApplication kullanılıyor olmalı
          printf '%s\n' "$MANIFEST_TREE" | grep -q 'ClaudeApplication' \
            && echo "✓ ClaudeApplication manifest'te mevcut" \
            || { echo "✗ ClaudeApplication manifest'te bulunamadı"; exit 1; }

          # ClaudeApplication DEX'te olmalı
          FOUND_APP=0
          for DEX in $(unzip -Z1 claude-unsigned.apk | grep -E "^classes[0-9]*\.dex$"); do
            unzip -p claude-unsigned.apk "$DEX" | strings \
              | grep -q 'Lcom/anthropic/claude/application/ClaudeApplication;' && FOUND_APP=1 || true
          done
          test "$FOUND_APP" = 1 \
            && echo "✓ ClaudeApplication DEX'te mevcut" \
            || { echo "✗ ClaudeApplication DEX'te bulunamadı"; exit 1; }

          # VelaudApplication olmamalı (crash döngüsü önlemi)
          if printf '%s\n' "$MANIFEST_TREE" | grep -q 'VelaudApplication'; then
            echo "✗ VelaudApplication manifest'te kaldı — hata"; exit 1
          fi
          echo "✓ VelaudApplication yok (crash döngüsü riski ortadan kalktı)"

          # Split metadata olmamalı
          if printf '%s\n' "$MANIFEST_TREE" | grep -Eq 'requiredSplitTypes|splitTypes|com.android.vending.splits'; then
            echo "✗ Split metadata hâlâ manifest'te"; exit 1
          fi
          echo "✓ Standalone: split metadata yok"

      - name: Keystore oluştur
        run: |
          keytool -genkey -v \
            -keystore claude.keystore \
            -alias claude \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass claude123 -keypass claude123 \
            -dname "CN=Claude, OU=Dev, O=Claude, L=Istanbul, ST=Istanbul, C=TR"

      - name: Zipalign ve Sign
        run: |
          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          echo "Build tools: $BT"

          # -p: .so dosyalarını 4096-byte sayfa hizasına getirir (extractNativeLibs için zorunlu)
          $BT/zipalign -p -f -v 4 claude-unsigned.apk claude-aligned.apk

          $BT/apksigner sign \
            --ks claude.keystore \
            --ks-key-alias claude \
            --ks-pass pass:claude123 \
            --key-pass pass:claude123 \
            --out claude-standalone-signed.apk \
            claude-aligned.apk

          echo ""
          echo "=== İmzalı APK ==="
          ls -lh claude-standalone-signed.apk
          $BT/apksigner verify --verbose claude-standalone-signed.apk

          echo ""
          echo "=== Final package ==="
          $BT/aapt dump badging claude-standalone-signed.apk | grep "package:"
          $BT/aapt dump badging claude-standalone-signed.apk | grep -q "name='com.anthropic.claude'" \
            && echo "✓ Package doğrulandı" \
            || { echo "✗ Package hatası"; exit 1; }

          echo "=== Standalone doğrulama ==="
          XMLTREE="$($BT/aapt dump xmltree claude-standalone-signed.apk AndroidManifest.xml)"
          if printf '%s\n' "$XMLTREE" | grep -Eq 'requiredSplitTypes|splitTypes|com.android.vending.splits'; then
            echo "✗ Split metadata var"; exit 1
          fi
          if unzip -l claude-standalone-signed.apk | grep -q 'res/xml/splits0.xml'; then
            echo "✗ splits0.xml hâlâ APK içinde"; exit 1
          fi
          echo "✓ Standalone APK doğrulandı"

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName:" apk_work/decompiled/apktool.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} | Run: ${{ github.run_number }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-v${{ steps.version.outputs.version }}-run${{ github.run_number }}
          path: claude-standalone-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Claude v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## 📱 Claude APK

            **Versiyon:** ${{ steps.version.outputs.version }}
            **Build:** ${{ github.run_number }}

            ---

            ### ✅ Değişiklikler
            - Tüm mesaj ve dosya limitleri kaldırıldı
            - Herkes otomatik MAX planda
            - Ödeme sistemi kaldırıldı
            - ARM64 native lib'leri standalone APK içine gömüldü
            - Split gereksinimleri kaldırıldı
            - **Crash döngüsü düzeltildi:** Orijinal ClaudeApplication kullanılıyor
            - Koin / Sentry / tüm başlatma orijinal gibi çalışıyor
            - "velaud" wrapper sınıfları kaldırıldı

            ---

            ### 📥 Kurulum

            **Yalnızca `claude-standalone-signed.apk` dosyasını kur. Başka dosya gerekmez.**

            > ⚠️ Önceki farklı imzalı kurulumu önce kaldırın (paket: `com.anthropic.claude`)
            > ⚠️ Ayarlar → Güvenlik → Bilinmeyen kaynaklardan yükleme etkinleştirilmeli

          files: claude-standalone-signed.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
