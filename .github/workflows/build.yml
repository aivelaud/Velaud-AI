name: Build Claude AI APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/apktool.jar
          apktool --version

      - name: Build APK with Apktool
        run: |
          # Sadece smali -> dex ve manifest derle (resources.arsc rebuild atlanir)
          # --no-res: aapt2 ile resources.arsc derleme (bozuk output'u onlemek icin)
          apktool b apk_work/decompiled --no-res -o /tmp/rebuilt.apk
          echo "Apktool rebuild tamamlandi"
          echo "Rebuilt APK icindekiler:"
          unzip -l /tmp/rebuilt.apk | grep -E "classes|AndroidManifest"

          # Orijinal base.apk'yi temel al (dogru resources.arsc + tum res/ dosyalari)
          cp apk_work/extracted/base.apk claude-unsigned.apk
          echo "Orijinal base.apk: $(ls -lh claude-unsigned.apk)"

          # Eski imzalari, eski dex'leri ve eski manifest'i kaldir
          zip -d claude-unsigned.apk "META-INF/*" 2>/dev/null || true
          zip -d claude-unsigned.apk "classes.dex" "classes2.dex" "classes3.dex" 2>/dev/null || true
          zip -d claude-unsigned.apk "AndroidManifest.xml" 2>/dev/null || true

          # Apktool'un yeniden derledigini alanlari cikar
          mkdir -p /tmp/rebuilt-files
          unzip -j /tmp/rebuilt.apk "classes*.dex" "AndroidManifest.xml" -d /tmp/rebuilt-files/
          echo "Cikartilan dosyalar:"
          ls -lh /tmp/rebuilt-files/

          # Yeni dex'leri APK'ya uncompressed ekle (Android standardi)
          (cd /tmp/rebuilt-files && zip -0 $GITHUB_WORKSPACE/claude-unsigned.apk classes*.dex)

          # Yeni AndroidManifest.xml'i APK'ya ekle (split gereksinimleri kaldirildi)
          (cd /tmp/rebuilt-files && zip $GITHUB_WORKSPACE/claude-unsigned.apk AndroidManifest.xml)

          # Kullanicinin ekledigi icon dosyalarini APK'ya ekle
          (cd apk_work/decompiled && \
            find res -name "ic_launcher_velaud*" -type f | while IFS= read -r f; do \
              echo "Icon ekleniyor: $f"; \
              zip $GITHUB_WORKSPACE/claude-unsigned.apk "$f"; \
            done)

          echo ""
          echo "=== BUILD SONUCU ==="
          echo "APK boyutu: $(ls -lh claude-unsigned.apk)"
          echo "Dosya sayisi: $(unzip -l claude-unsigned.apk | tail -1)"

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore claude-debug.keystore \
            -alias claude \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass claude123 \
            -keypass claude123 \
            -dname "CN=Claude AI, OU=Dev, O=Claude, L=Istanbul, ST=Istanbul, C=TR"

      - name: Align APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign \
            -v 4 claude-unsigned.apk claude-aligned.apk
          echo "Zipalign tamamlandi"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner \
            sign \
            --ks claude-debug.keystore \
            --ks-key-alias claude \
            --ks-pass pass:claude123 \
            --key-pass pass:claude123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out claude-signed.apk \
            claude-aligned.apk
          echo "Imzalama tamamlandi: $(ls -lh claude-signed.apk)"

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner \
            verify --verbose claude-signed.apk
          echo ""
          echo "=== MANIFEST KONTROL ==="
          unzip -p claude-signed.apk AndroidManifest.xml | strings | grep -o 'requiredSplitTypes\|splits\.required\|com\.anthropic\.[a-z]*' | head -10 || echo "Split gereksinimleri yok - OK"

      - name: Get version info
        id: version
        working-directory: apk_work/decompiled
        run: |
          VERSION=$(grep "versionName:" apktool.yml | awk '{print $2}')
          BUILD=$(grep "versionCode:" apktool.yml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "APK Version: $VERSION ($BUILD)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-AI-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: claude-signed.apk
          retention-days: 30

      - name: Create Release (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Claude AI v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Claude AI APK

            **Versiyon:** ${{ steps.version.outputs.version }}
            **Build:** ${{ steps.version.outputs.build }}
            **Commit:** ${{ github.sha }}

            ### Degisiklikler
            - Tum limitler kaldirildi (mesaj, dosya)
            - Herkes max planda
            - Ikon degistirildi
            - Odeme sistemi kaldirildi

            ### Kurulum
            APK'yi indir -> Yukle (Bilinmeyen kaynaklara izin ver)
            NOT: Cihazda varsa once mevcut Claude'u kaldir, sonra yukle
          files: claude-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
