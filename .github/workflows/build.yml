name: Build Velaud AI APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/apktool.jar
          apktool --version

      - name: Build APK with Apktool
        working-directory: apk_work/decompiled
        run: |
          apktool b . -o ../../velaud-unsigned.apk --use-aapt2
          echo "Build tamamlandi: $(ls -lh ../../velaud-unsigned.apk)"

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore velaud-debug.keystore \
            -alias velaud \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass velaud123 \
            -keypass velaud123 \
            -dname "CN=Velaud AI, OU=Dev, O=Velaud, L=Istanbul, ST=Istanbul, C=TR"

      - name: Align APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign \
            -v 4 velaud-unsigned.apk velaud-aligned.apk
          echo "Zipalign tamamlandi"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner \
            sign \
            --ks velaud-debug.keystore \
            --ks-key-alias velaud \
            --ks-pass pass:velaud123 \
            --key-pass pass:velaud123 \
            --out velaud-signed.apk \
            velaud-aligned.apk
          echo "Imzalama tamamlandi: $(ls -lh velaud-signed.apk)"

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner \
            verify --verbose velaud-signed.apk

      - name: Get version info
        id: version
        working-directory: apk_work/decompiled
        run: |
          VERSION=$(grep "versionName:" apktool.yml | awk '{print $2}')
          BUILD=$(grep "versionCode:" apktool.yml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "APK Version: $VERSION ($BUILD)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Velaud-AI-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: velaud-signed.apk
          retention-days: 30

      - name: Create Release (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Velaud AI v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Velaud AI APK

            **Versiyon:** ${{ steps.version.outputs.version }}
            **Build:** ${{ steps.version.outputs.build }}
            **Commit:** ${{ github.sha }}

            ### Degisiklikler
            - Tum limitler kaldirildi (mesaj, dosya)
            - Herkes max planda
            - Ikon degistirildi
            - Odeme sistemi kaldirildi

            ### Kurulum
            APK'yi indir -> Yukle (Bilinmeyen kaynaklara izin ver)
          files: velaud-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
