name: Build Claude APK

on:
  push:
    branches: [ main, clean-main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Orijinal APK çıkar + Smali decompile
        run: |
          echo "=== Orijinal APK çıkarılıyor ==="
          unzip -o apk_work/base.apk.zip -d orig_dir/
          ls -lh orig_dir/base.apk

          echo ""
          echo "=== Smali decompile ediliyor (binary kaynaklar korunuyor) ==="
          # -r ile kaynaklar ve binary manifest korunur; böylece uygulamanın
          # özel resource attribute'ları yeniden derlenmeye çalışılmaz.
          apktool d -r -f orig_dir/base.apk -o work/

          echo ""
          echo "=== work/ içeriği ==="
          ls work/
          echo "Smali dosya sayısı: $(find work/smali* -name '*.smali' 2>/dev/null | wc -l)"

      - name: Manifesti text olarak decode et
        run: |
          echo "=== Manifest ayrı decode ediliyor ==="
          apktool d -s -f orig_dir/base.apk -o manifest_work/
          file manifest_work/AndroidManifest.xml

      - name: Manifest class isimlerini normalize et (velaud namespace'e sabitle)
        run: |
          echo "=== Manifest class isimleri normalize ediliyor ==="
          # apktool decode sırasında kısa class isimlerini (örn. .mainactivity.MainActivity)
          # package ile expand eder. Eğer orijinal APK package'ı com.anthropic.claude ise
          # class isimleri com.anthropic.claude.* olur ama DEX'te com.anthropic.velaud.* var.
          # Bu adım tüm class referanslarını velaud'a normalleştirir (package attribute hariç).
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("manifest_work/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          # android:name="com.anthropic.claude.XXX" → com.anthropic.velaud.XXX
          # Sadece android:name attribute'larındaki class isimlerini değiştir,
          # package="..." attribute'unu dokunma.
          def fix_classname(m):
              attr = m.group(0)
              # package= attribute'unu değiştirme
              if attr.startswith('package='):
                  return attr
              return attr.replace('com.anthropic.claude.', 'com.anthropic.velaud.')

          # android:name, android:targetActivity gibi class referanslarını düzelt
          text = re.sub(
              r'android:name="com\.anthropic\.claude\.[^"]*"',
              lambda m: m.group(0).replace('com.anthropic.claude.', 'com.anthropic.velaud.'),
              text
          )
          text = re.sub(
              r'android:targetActivity="com\.anthropic\.claude\.[^"]*"',
              lambda m: m.group(0).replace('com.anthropic.claude.', 'com.anthropic.velaud.'),
              text
          )

          manifest.write_text(text, encoding="utf-8")
          print("✓ Class isimleri velaud namespace'e normalize edildi")
          PY

      - name: Manifest'e ek activity kayıtlarını ekle
        run: |
          echo "=== Ek Activity kayıtları manifest'e ekleniyor ==="
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("manifest_work/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          marker = "</application>"
          if marker not in text:
              raise SystemExit("AndroidManifest.xml içinde application kapanışı bulunamadı")

          additions = []

          # VelaudLogActivity — velaud namespace (DEX'teki gerçek class adı)
          log_activity = "com.anthropic.velaud.velaudlog.VelaudLogActivity"
          if log_activity not in text:
              additions.append(
                  f'        <activity android:exported="false" '
                  f'android:name="{log_activity}" '
                  f'android:label="Velaud Loglar&#x131;"/>'
              )

          # CrashActivity — crash olduğunda log ekranı gösterir
          crash_activity = "com.anthropic.velaud.crash.CrashActivity"
          if crash_activity not in text:
              additions.append(
                  f'        <activity android:exported="false" '
                  f'android:name="{crash_activity}" '
                  f'android:label="Crash Log" '
                  f'android:theme="@style/Theme.Claude"/>'
              )

          if additions:
              insert = "\n".join(additions)
              text = text.replace(marker, insert + "\n" + marker, 1)
              manifest.write_text(text, encoding="utf-8")
              print(f"✓ {len(additions)} activity eklendi")
          else:
              print("✓ Tüm activity kayıtları zaten mevcut")
          PY

      - name: Manifest doğrula
        working-directory: manifest_work
        run: |
          echo "=== AndroidManifest.xml kontrolleri ==="
          grep -i "package" AndroidManifest.xml | head -3 || true

          # VelaudApplication velaud namespace'inde olmalı (DEX'teki gerçek class)
          grep -q 'com.anthropic.velaud.application.VelaudApplication' AndroidManifest.xml \
            && echo "✓ VelaudApplication (velaud) mevcut" \
            || echo "✗ UYARI: VelaudApplication bulunamadı"

          # MainActivity velaud namespace'inde olmalı
          grep -q 'com.anthropic.velaud.mainactivity.MainActivity' AndroidManifest.xml \
            && echo "✓ MainActivity (velaud) mevcut" \
            || echo "✗ UYARI: MainActivity bulunamadı"

          # VelaudLogActivity eklendi mi?
          grep -q 'com.anthropic.velaud.velaudlog.VelaudLogActivity' AndroidManifest.xml \
            && echo "✓ VelaudLogActivity eklendi" \
            || echo "✗ UYARI: VelaudLogActivity eksik"

          # CrashActivity eklendi mi?
          grep -q 'com.anthropic.velaud.crash.CrashActivity' AndroidManifest.xml \
            && echo "✓ CrashActivity eklendi" \
            || echo "✗ UYARI: CrashActivity eksik"

      - name: Smali patchlerini uygula (velaud namespace — DEX class adlarıyla uyumlu)
        run: |
          echo "=== Patch dosyaları uygulanıyor (velaud namespace) ==="
          # ÖNEMLI: Tüm patchler com/anthropic/velaud/ altına kopyalanır.
          # Manifest'teki class referansları velaud namespace'ini kullandığından
          # class adlarını claude'a rename etmek ClassNotFoundException'a yol açar.

          # Rate limit bypass (b3d)
          cp apk_work/decompiled/smali/b3d.smali work/smali/ \
            && echo "✓ b3d.smali" || echo "✗ b3d.smali bulunamadı"

          # ExceedsLimit bypass (ig3)
          cp apk_work/decompiled/smali/ig3.smali work/smali/ \
            && echo "✓ ig3.smali" || echo "✗ ig3.smali bulunamadı"

          # BellConfig
          cp apk_work/decompiled/smali/BellConfig.smali work/smali/ \
            && echo "✓ BellConfig.smali" || echo "✗ BellConfig.smali bulunamadı"

          # Organization - rate_limit_tier = 'max'
          mkdir -p work/smali/com/anthropic/velaud/api/account/
          cp apk_work/decompiled/smali/com/anthropic/velaud/api/account/Organization.smali \
             work/smali/com/anthropic/velaud/api/account/ \
            && echo "✓ Organization.smali" || echo "✗ Organization.smali bulunamadı"

          # File upload limit 10GB
          mkdir -p "work/smali/com/anthropic/velaud/chat/input/files/"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/chat/input/files/a.smali" \
             "work/smali/com/anthropic/velaud/chat/input/files/" \
            && echo "✓ files/a.smali" || echo "✗ files/a.smali bulunamadı"

          # Claude Log Görücü
          mkdir -p "work/smali/com/anthropic/velaud/velaudlog/"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/velaudlog/VelaudLogHelper.smali" \
             "work/smali/com/anthropic/velaud/velaudlog/" \
            && echo "✓ VelaudLogHelper.smali" || echo "✗ VelaudLogHelper.smali bulunamadı"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/velaudlog/VelaudLogActivity.smali" \
             "work/smali/com/anthropic/velaud/velaudlog/" \
            && echo "✓ VelaudLogActivity.smali" || echo "✗ VelaudLogActivity.smali bulunamadı"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/velaudlog/VelaudLogButton.smali" \
             "work/smali/com/anthropic/velaud/velaudlog/" \
            && echo "✓ VelaudLogButton.smali" || echo "✗ VelaudLogButton.smali bulunamadı"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/velaudlog/VelaudLogAttach.smali" \
             "work/smali/com/anthropic/velaud/velaudlog/" \
            && echo "✓ VelaudLogAttach.smali" || echo "✗ VelaudLogAttach.smali bulunamadı"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/velaudlog/VelaudLogRecorder.smali" \
             "work/smali/com/anthropic/velaud/velaudlog/" \
            && echo "✓ VelaudLogRecorder.smali" || echo "✗ VelaudLogRecorder.smali bulunamadı"

          # Crash handler
          mkdir -p "work/smali/com/anthropic/velaud/crash/"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/crash/CrashHandler.smali" \
             "work/smali/com/anthropic/velaud/crash/" \
            && echo "✓ CrashHandler.smali" || echo "✗ CrashHandler.smali bulunamadı"

          # MainActivity — log bildirimini başlatan enjeksiyon (orijinalin üzerine yazar)
          mkdir -p "work/smali/com/anthropic/velaud/mainactivity/"
          cp "apk_work/decompiled/smali/com/anthropic/velaud/mainactivity/MainActivity.smali" \
             "work/smali/com/anthropic/velaud/mainactivity/" \
            && echo "✓ MainActivity.smali (log enjeksiyonu)" || echo "✗ MainActivity.smali bulunamadı"

          echo ""
          echo "=== Patch özeti ==="
          echo "Velaud smali sayısı (patch sonrası): $(find work/smali/com/anthropic/velaud -name '*.smali' 2>/dev/null | wc -l)"

      - name: ARM64 native lib ekle
        run: |
          echo "=== ARM64 native lib'leri ekleniyor ==="
          mkdir -p work/lib/arm64-v8a/
          cp apk_work/decompiled/lib/arm64-v8a/*.so work/lib/arm64-v8a/
          echo "Eklenen lib'ler:"
          ls -lh work/lib/arm64-v8a/

      - name: splits0.xml temizle (standalone APK için - split gereksinimi kaldır)
        run: |
          echo "=== splits0.xml temizleniyor ==="
          SPLITS_FILE="work/res/xml/splits0.xml"
          if [ -f "$SPLITS_FILE" ]; then
            echo "Mevcut splits0.xml:"
            cat "$SPLITS_FILE"
            echo ""
            printf '<?xml version="1.0" encoding="utf-8"?>\n<splits>\n    <module name=""></module>\n</splits>\n' > "$SPLITS_FILE"
            echo "✓ splits0.xml sıfırlandı (standalone APK)"
          else
            echo "splits0.xml bulunamadı, atlanıyor"
          fi

      - name: apktool.yml güncelle (renameManifestPackage + doNotCompress)
        working-directory: work
        run: |
          echo "=== Mevcut apktool.yml ==="
          cat apktool.yml

          # renameManifestPackage: package attribute'unu com.anthropic.claude yapar.
          # Dikkat: Sadece manifest package attribute'unu değiştirir, class isimlerini değil.
          # Class isimleri velaud namespace'inde kalır (DEX ile uyumlu).
          if grep -q "renameManifestPackage: null" apktool.yml; then
            sed -i 's/renameManifestPackage: null/renameManifestPackage: com.anthropic.claude/' apktool.yml
            echo "→ renameManifestPackage: null → com.anthropic.claude"
          elif grep -q "renameManifestPackage:" apktool.yml; then
            sed -i 's/renameManifestPackage:.*/renameManifestPackage: com.anthropic.claude/' apktool.yml
            echo "→ renameManifestPackage güncellendi"
          else
            sed -i '/forcedPackageId:/a\  renameManifestPackage: com.anthropic.claude' apktool.yml
            echo "→ renameManifestPackage eklendi"
          fi

          sed -i 's/forcedPackageId: null/forcedPackageId: 127/' apktool.yml || true

          if ! grep -q "^doNotCompress:" apktool.yml; then
            printf '\ndoNotCompress:\n- dex\n- so\n- resources.arsc\n' >> apktool.yml
            echo "→ doNotCompress listesi eklendi"
          else
            grep -q "^- dex" apktool.yml || sed -i '/^doNotCompress:/a - dex' apktool.yml
            grep -q "^- so"  apktool.yml || sed -i '/^doNotCompress:/a - so'  apktool.yml
            echo "→ doNotCompress güncellendi"
          fi

          echo ""
          echo "=== Güncellenmiş apktool.yml ==="
          cat apktool.yml

      - name: APK Build
        run: |
          echo "=== APK build ediliyor ==="
          apktool b work/ -o claude-unsigned.apk

          echo ""
          ls -lh claude-unsigned.apk

          echo ""
          echo "=== DEX + .so compression kontrolü ==="
          unzip -v claude-unsigned.apk | grep -E "\.dex|\.so|resources\.arsc"

      - name: Binary manifesti APK'ya uygula
        run: |
          echo "=== Manifest binary XML'e çevriliyor ==="
          # manifest_work/AndroidManifest.xml:
          #   - package="com.anthropic.claude" (apktool tarafından decode edilen orijinal)
          #   - class isimleri com.anthropic.velaud.* (normalize adımında düzeltildi)
          # Bu, DEX'teki gerçek class isimleriyle uyumludur.
          unzip -p apk_work/apktool.jar prebuilt/linux/aapt_64 > aapt
          chmod +x aapt
          FRAMEWORK=$(find "$HOME/.local/share/apktool/framework" -name 1.apk -print -quit)
          if [ -z "$FRAMEWORK" ]; then
            echo "Apktool framework 1.apk bulunamadı"
            exit 1
          fi

          VERSION_CODE=$(grep "versionCode:" apk_work/decompiled/apktool.yml | awk '{print $2}')
          VERSION_NAME=$(grep "versionName:" apk_work/decompiled/apktool.yml | awk '{print $2}')

          ./aapt package -u -f \
            -M manifest_work/AndroidManifest.xml \
            -I "$FRAMEWORK" \
            -I orig_dir/base.apk \
            --forced-package-id 127 \
            --min-sdk-version 32 \
            --target-sdk-version 36 \
            --version-code "$VERSION_CODE" \
            --version-name "$VERSION_NAME" \
            -F claude-unsigned.apk

          # Manifest doğrula: package com.anthropic.claude olmalı
          ./aapt dump badging claude-unsigned.apk | grep -q "name='com.anthropic.claude'" \
            && echo "✓ APK package: com.anthropic.claude" \
            || (echo "✗ HATA: Package adı yanlış!" && exit 1)

          # VelaudApplication velaud namespace'inde olmalı (DEX uyumu)
          ./aapt dump xmltree claude-unsigned.apk AndroidManifest.xml | \
            grep -q 'com.anthropic.velaud.application.VelaudApplication' \
            && echo "✓ VelaudApplication class (velaud) doğrulandı" \
            || echo "⚠ UYARI: VelaudApplication velaud namespace'inde bulunamadı"

          # VelaudLogActivity eklendi mi?
          ./aapt dump xmltree claude-unsigned.apk AndroidManifest.xml | \
            grep -q 'com.anthropic.velaud.velaudlog.VelaudLogActivity' \
            && echo "✓ VelaudLogActivity doğrulandı" \
            || echo "⚠ VelaudLogActivity binary manifest'te bulunamadı"

      - name: Keystore oluştur
        run: |
          keytool -genkey -v \
            -keystore claude.keystore \
            -alias claude \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass velaud123 -keypass velaud123 \
            -dname "CN=Claude, OU=Dev, O=Claude, L=Istanbul, ST=Istanbul, C=TR"

      - name: Zipalign ve Sign (base APK)
        run: |
          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          echo "Build tools: $BT"

          # -p flag: .so dosyalarını 4096 byte (sayfa) hizasına getirir
          # extractNativeLibs=false için ZORUNLU — olmadan siyah/gri ekran
          $BT/zipalign -p -f -v 4 claude-unsigned.apk claude-aligned.apk

          $BT/apksigner sign \
            --ks claude.keystore \
            --ks-key-alias claude \
            --ks-pass pass:velaud123 \
            --key-pass pass:velaud123 \
            --out claude-base-signed.apk \
            claude-aligned.apk

          echo ""
          echo "=== İmzalı base APK ==="
          ls -lh claude-base-signed.apk
          $BT/apksigner verify --verbose claude-base-signed.apk

          echo ""
          echo "=== Final APK package name ==="
          $BT/aapt dump badging claude-base-signed.apk | grep "package:"
          $BT/aapt dump badging claude-base-signed.apk | grep -q "name='com.anthropic.claude'" \
            && echo "✓ Package doğrulandı" || (echo "✗ Package hatası" && exit 1)

      - name: split_config.arm64_v8a APK imzala
        run: |
          echo "=== split_config.arm64_v8a APK imzalanıyor ==="
          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)

          # Orijinal split_config'i zip'ten çıkar
          unzip -o apk_work/base.apk.zip -d orig_dir/ || true

          # base.apk.zip'te split yoksa, decompiled lib'lerden yeniden paketle
          SPLIT_SRC="apk_work/decompiled/lib/arm64-v8a"
          if [ -d "$SPLIT_SRC" ]; then
            echo "→ arm64 lib'lerden split_config paketi oluşturuluyor"
            mkdir -p split_work/lib/arm64-v8a
            cp "$SPLIT_SRC"/*.so split_work/lib/arm64-v8a/

            # Minimal split manifest
            cat > split_work/AndroidManifest.xml <<'XML'
            <?xml version="1.0" encoding="utf-8"?>
            <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                package="com.anthropic.claude"
                android:versionCode="1"
                split="config.arm64_v8a">
                <uses-sdk android:minSdkVersion="32" android:targetSdkVersion="36"/>
                <application/>
            </manifest>
            XML

            cd split_work && zip -r ../split-unsigned.apk lib/ AndroidManifest.xml && cd ..
            echo "split-unsigned.apk oluşturuldu ($(du -sh split-unsigned.apk | cut -f1))"
          else
            echo "✗ arm64 lib kaynağı bulunamadı"
            exit 1
          fi

          # Zipalign + İmzala
          $BT/zipalign -p -f -v 4 split-unsigned.apk split-aligned.apk
          $BT/apksigner sign \
            --ks claude.keystore \
            --ks-key-alias claude \
            --ks-pass pass:velaud123 \
            --key-pass pass:velaud123 \
            --out split_config.arm64_v8a-signed.apk \
            split-aligned.apk

          echo ""
          echo "=== İmzalı split APK ==="
          ls -lh split_config.arm64_v8a-signed.apk
          $BT/apksigner verify --verbose split_config.arm64_v8a-signed.apk

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName:" apk_work/decompiled/apktool.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} | Run: ${{ github.run_number }}"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-v${{ steps.version.outputs.version }}-run${{ github.run_number }}
          path: |
            claude-base-signed.apk
            split_config.arm64_v8a-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Claude v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## 📱 Claude APK

            **Versiyon:** ${{ steps.version.outputs.version }}
            **Build:** ${{ github.run_number }}

            ---

            ### ✅ Değişiklikler
            - Tüm mesaj ve dosya limitleri kaldırıldı
            - Herkes otomatik MAX planda
            - Ödeme sistemi kaldırıldı
            - ARM64 native lib'leri base.apk içine gömüldü
            - Split APK gereksinimi kaldırıldı (standalone kurulum)
            - **Crash düzeltmesi:** Manifest class isimleri DEX ile uyumlu hale getirildi
            - CrashActivity manifest'e eklendi (crash logları görünür)

            ---

            ### 📥 Kurulum

            **Sadece `claude-base-signed.apk` kur — ARM64 lib'leri içinde.**

            > ⚠️ Ayarlar → Güvenlik → "Bilinmeyen kaynaklardan yükleme" aktif olmalı.
            > ⚠️ Mevcut Claude uygulamasının üzerine kurulabilir; paket adı: `com.anthropic.claude`.

          files: |
            claude-base-signed.apk
            split_config.arm64_v8a-signed.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
